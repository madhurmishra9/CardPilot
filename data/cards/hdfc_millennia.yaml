# Seed values — verify against issuer MITC before production use.
card_id: hdfc_millennia
display_name: "HDFC Bank Millennia Credit Card"
issuer: "HDFC Bank"
network_variants: [visa, mastercard, rupay]
lifetime_free: false
joining_fee: 1000
annual_fee: 1000
annual_fee_gst_extra: true
annual_fee_waiver_spend: 100000
last_verified: "2026-07-03"
source_url: "https://www.hdfcbank.com/personal/pay/cards/credit-cards/millennia-cards"

reward_program: "CashPoints"
point_value_inr: 1.0                    # 1 CP = ₹1 against statement (redemption fee applies)
redemption_fee_inr: 99
redemption_fee_gst_rate: 0.18
points_expiry_months: 24

earn_rules:
  rates:
    - category: online_shopping          # 5% on partner merchants (Amazon, Flipkart, Myntra…)
      rate_points_per_100: 5
      monthly_cap_points: 1000
    - category: retail_default
      rate_points_per_100: 1
  excluded_categories: [fuel, wallet_load, emi_conversion, cash_advance, rent, government]

milestones:
  period: calendar_quarter
  tiers:
    - spend: 100000                      # ₹1L/quarter → ₹1000 voucher
      bonus_points: 1000
  max_bonus_points: 4000

perks:
  fuel_surcharge_waiver:
    rate: 0.01
    min_txn: 400
    max_txn: 5000
    merchants: []
  lounge_domestic_airport:
    count_per_quarter: 1
    unlock_spend_prev_quarter: 100000
    value_per_visit_inr: 1000
